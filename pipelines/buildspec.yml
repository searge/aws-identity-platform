version: 0.2

phases:
  pre_build:
    commands:
      - echo "Installing Terraform..."
      - wget -q https://releases.hashicorp.com/terraform/1.9.0/terraform_1.9.0_linux_amd64.zip
      - unzip -q terraform_1.9.0_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform --version
      - echo "Navigating to identity-platform directory..."
      - cd identity-platform

  build:
    commands:
      - echo "Initializing Terraform..."
      - terraform init
      - echo "Validating Terraform configuration..."
      - terraform validate
      - echo "Planning Terraform changes..."
      - terraform plan -out=tfplan
      - echo "Applying Terraform changes..."
      - terraform apply -auto-approve tfplan

  post_build:
    commands:
      - echo "Terraform deployment completed on $(date)"

artifacts:
  files:
    - '**/*'
